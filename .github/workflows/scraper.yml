name: Super Job Scraper

on:
  schedule:
    - cron: "*/15 * * * *"   # toutes les 15 minutes
  workflow_dispatch:         # lancement manuel depuis GitHub

concurrency:
  group: scraper
  cancel-in-progress: false  # attend la fin du run en cours avant d'en lancer un autre

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Run scraper (1 cycle)
        env:
          DATABASE_URL:        ${{ secrets.DATABASE_URL }}
          OPENROUTER_API_KEY:  ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL:    ${{ secrets.OPENROUTER_MODEL }}
          RESEND_API_KEY:      ${{ secrets.RESEND_API_KEY }}
          SENDER_EMAIL:        ${{ secrets.SENDER_EMAIL }}
          CANDIDATE_NAME:      ${{ secrets.CANDIDATE_NAME }}
          TARGET_COUNTRY:      France
        run: python run_once.py
